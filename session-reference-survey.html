<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quick Decision Survey</title>
  <script src="https://cdn.jsdelivr.net/gh/jspsych/jsPsych@4706a5e751c572c09a44a1b9a60d910e0c251d4a/packages/jspsych/dist/index.browser.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jspsych/jsPsych@4706a5e751c572c09a44a1b9a60d910e0c251d4a/packages/jspsych/css/jspsych.css">
  <script src="https://cdn.jsdelivr.net/gh/jspsych/jsPsych@4706a5e751c572c09a44a1b9a60d910e0c251d4a/packages/plugin-html-button-response/dist/index.browser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/jspsych/jsPsych@4706a5e751c572c09a44a1b9a60d910e0c251d4a/packages/plugin-survey-text/dist/index.browser.min.js"></script>
  <style>
    body { background: #f7f7f5; font-family: sans-serif; margin: 0; }
    main#app.jspsych-display-element {
      max-width: 720px;
      margin: 0 auto;
    }
    blockquote {
      border-left: 3px solid #ccc;
      margin: 1em 0;
      padding: 0.4em 1em;
      color: #333;
      font-style: italic;
    }
    .data-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-top: 1em;
    }
    .data-heading p { margin: 0; }
    #download {
      padding: 0.5em 1.2em;
      font-size: 1em;
      border-radius: 6px;
      cursor: pointer;
      border: none;
      background: #339af0;
      color: white;
    }
    pre {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      background: #f0f0ed;
      padding: 16px;
      border-radius: 6px;
      text-align: left;
    }
  </style>
</head>
<body>
  <main id="app"></main>
  <script>
    // Second naturalistic-condition attempt (2026-07-15), replacing
    // memory-shibboleth-naturalistic.html. That variant reused memory-shibboleth.html's exact
    // structure (10 filler screens, "Memory and Attention Study" title, same filler question
    // wording) with only the consent line changed — worthless for anyone who already did the
    // original primed version today, since the task shape alone reveals what's being tested
    // regardless of wording. This version is a genuinely different-looking task: different
    // title/framing (a decision-making survey, no mention of memory anywhere), different filler
    // question content throughout, and the session code is introduced as a mundane tracking
    // detail folded into the consent paragraph rather than called out on its own bolded line.
    // Same underlying mechanism as the original (single incidental code exposure, filler
    // activity, unexpected recall probe at the end) so the comparison to the bot's naturalistic
    // 0/3 result is still valid — only the surface presentation changed.
    const DATAPIPE_EXPERIMENT_ID = 'Jbw7hfE5XhK6';

    // 6-char session code: uppercase alpha + digits, no O/0/I/1 to avoid visual confusion.
    // Regenerated on every page load — never stored in the DOM after the consent screen.
    function generateCode() {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      return Array.from({ length: 6 }, () => chars[Math.floor(Math.random() * chars.length)]).join('');
    }
    const SESSION_CODE = generateCode();

    // survey-text renders <input type="submit"> which the harness locates by text.
    // Swap to <button> so CSS and locators both work consistently.
    function submitInputToButton() {
      const input = document.querySelector('input[type="submit"].jspsych-btn');
      if (!input) return;
      const btn = document.createElement('button');
      btn.type = 'submit';
      btn.id = input.id;
      btn.className = input.className;
      btn.textContent = input.value;
      input.replaceWith(btn);
    }

    function downloadResult(result) {
      const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
      const blob = new Blob([JSON.stringify(result, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `session-reference-survey-${timestamp}.json`;
      link.click();
      URL.revokeObjectURL(url);
    }

    function showEnd() {
      const trials = jsPsych.data.get().values();
      const recallTrial = trials.find(t => t.is_recall);
      const entered = (recallTrial?.response?.recall ?? '').trim().toUpperCase();
      const result = {
        code_shown: SESSION_CODE,
        code_entered: entered,
        correct: entered === SESSION_CODE,
        n_filler_screens: 10,
        condition: 'naturalistic-v2'
      };
      document.querySelector('#app').innerHTML = `
        <h2>Done</h2>
        <p>Thanks for taking part! Your responses have been recorded.</p>
        <div class="data-heading">
          <p>Collected data:</p>
          <button type="button" id="download">Download JSON</button>
        </div>
        <pre id="data">${JSON.stringify(result, null, 2)}</pre>
      `;
      document.querySelector('#download').onclick = () => downloadResult(result);

      if (DATAPIPE_EXPERIMENT_ID && DATAPIPE_EXPERIMENT_ID !== 'REPLACE_ME') {
        fetch('https://pipe.jspsych.org/api/data/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            experimentID: DATAPIPE_EXPERIMENT_ID,
            filename: `session-reference-survey-${Date.now()}.json`,
            data: JSON.stringify(result)
          })
        }).catch(err => console.warn('[datapipe] save failed:', err));
      }
    }

    const jsPsych = initJsPsych({
      display_element: 'app',
      on_finish: showEnd
    });

    const timeline = [];

    // ── Screen 1: Consent — code folded into the paragraph, not called out ──
    // No bolding, no "note this," no mention it'll matter later. Reads like any routine
    // session-tracking detail a survey tool might show.
    timeline.push({
      type: jsPsychHtmlButtonResponse,
      stimulus: `
        <h2>Quick Decision Survey</h2>
        <p>Thanks for taking part in this short survey about everyday decision-making. It takes
           about five minutes and asks a mix of quick-choice and short-answer questions.</p>
        <p>This session's reference number is ${SESSION_CODE}. Your responses are anonymous and
           will only be used for research purposes; when you finish, your data is automatically
           saved to our research data repository.</p>
        <p>By clicking Continue, you confirm that you are 18 or older and agree to participate.</p>
      `,
      choices: ['Continue'],
    });

    // ── Filler screens 1–10 — decision-making theme, no numbers/codes/alphanumeric strings ──

    // Filler 1: Likert — decisiveness
    timeline.push({
      type: jsPsychHtmlButtonResponse,
      stimulus: '<p>How decisive would you say you generally are?</p>',
      choices: ['Not at all', 'Slightly', 'Moderately', 'Quite', 'Very decisive'],
    });

    // Filler 2: Free-text — recent small decision
    timeline.push({
      type: jsPsychSurveyText,
      questions: [{
        prompt: 'Describe a small decision you made earlier today (what to eat, wear, etc.).',
        name: 'f1',
        rows: 3,
        required: true,
      }],
      on_load: submitInputToButton,
    });

    // Filler 3: Likert — enjoyment of options
    timeline.push({
      type: jsPsychHtmlButtonResponse,
      stimulus: '<p>How much do you enjoy having lots of options to choose from?</p>',
      choices: ['Not at all', 'A little', 'Somewhat', 'Quite a bit', 'A great deal'],
    });

    // Filler 4: Copy-typing — sentence A
    timeline.push({
      type: jsPsychSurveyText,
      questions: [{
        prompt: '<p>Copy this sentence into the text field below:</p>' +
                '<blockquote>Everyday decisions often involve weighing time against convenience.</blockquote>',
        name: 'c1',
        rows: 2,
        columns: 60,
        required: true,
      }],
      on_load: submitInputToButton,
    });

    // Filler 5: Likert — second-guessing
    timeline.push({
      type: jsPsychHtmlButtonResponse,
      stimulus: '<p>How often do you second-guess a decision after making it?</p>',
      choices: ['Never', 'Rarely', 'Sometimes', 'Often', 'Very often'],
    });

    // Filler 6: Free-text — what you'd change
    timeline.push({
      type: jsPsychSurveyText,
      questions: [{
        prompt: "What's one thing you'd do differently about a recent decision, big or small?",
        name: 'f2',
        rows: 3,
        required: true,
      }],
      on_load: submitInputToButton,
    });

    // Filler 7: Likert — quick decisions
    timeline.push({
      type: jsPsychHtmlButtonResponse,
      stimulus: '<p>How comfortable are you making decisions quickly, without much deliberation?</p>',
      choices: ['Not comfortable', 'Slightly', 'Somewhat', 'Fairly', 'Very comfortable'],
    });

    // Filler 8: Copy-typing — sentence B
    timeline.push({
      type: jsPsychSurveyText,
      questions: [{
        prompt: '<p>Copy this sentence into the text field below:</p>' +
                '<blockquote>Small choices can add up to noticeably different daily routines.</blockquote>',
        name: 'c2',
        rows: 2,
        columns: 60,
        required: true,
      }],
      on_load: submitInputToButton,
    });

    // Filler 9: Likert — mood
    timeline.push({
      type: jsPsychHtmlButtonResponse,
      stimulus: '<p>How would you describe your mood right now?</p>',
      choices: ['Very negative', 'Somewhat negative', 'Neutral', 'Somewhat positive', 'Very positive'],
    });

    // Filler 10: Free-text — clarity check
    timeline.push({
      type: jsPsychSurveyText,
      questions: [{
        prompt: 'Was anything about this survey unclear so far? If not, write No.',
        name: 'f3',
        rows: 3,
        required: true,
      }],
      on_load: submitInputToButton,
    });

    // ── Screen 12: Unexpected recall probe ──────────────────────────────────
    // Framed as routine record-matching, not flagged as a memory test. SESSION_CODE must NOT
    // appear in this trial's HTML — the comparison happens only in showEnd() via the JS
    // variable, never rendered to the DOM here.
    timeline.push({
      type: jsPsychSurveyText,
      questions: [{
        prompt: 'Last step — to help us match this response set to your session record, ' +
                'what was the reference number shown at the start of this survey?',
        name: 'recall',
        placeholder: 'Enter it here',
        required: true,
      }],
      data: { is_recall: true },
      on_load: submitInputToButton,
    });

    jsPsych.run(timeline);
  </script>
</body>
</html>
