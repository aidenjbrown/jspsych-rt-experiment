<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>jsPsych Bot Prototype</title>
    <!-- Pinned jsPsych build with native session recording (record_session /
         getSessionRecording), required for the replay viewer. -->
    <script src="https://cdn.jsdelivr.net/gh/jspsych/jsPsych@4706a5e751c572c09a44a1b9a60d910e0c251d4a/packages/jspsych/dist/index.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jspsych/jsPsych@4706a5e751c572c09a44a1b9a60d910e0c251d4a/packages/jspsych/css/jspsych.css">
    <script src="https://cdn.jsdelivr.net/gh/jspsych/jsPsych@4706a5e751c572c09a44a1b9a60d910e0c251d4a/packages/plugin-html-keyboard-response/dist/index.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/jspsych/jsPsych@4706a5e751c572c09a44a1b9a60d910e0c251d4a/packages/plugin-html-button-response/dist/index.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/jspsych/jsPsych@4706a5e751c572c09a44a1b9a60d910e0c251d4a/packages/plugin-survey-text/dist/index.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/jspsych/jsPsych@4706a5e751c572c09a44a1b9a60d910e0c251d4a/packages/plugin-survey-multi-choice/dist/index.browser.min.js"></script>
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f7f5;
        color: #202124;
      }

      main#app {
        width: min(720px, calc(100vw - 32px));
        margin: 80px auto;
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 28px;
        box-sizing: border-box;
      }

      /* jsPsych centers content full-viewport by default; keep the card layout. */
      main#app.jspsych-display-element {
        height: auto;
        overflow-y: visible;
      }

      main#app .jspsych-content-wrapper {
        height: auto;
      }

      .target {
        width: 96px;
        height: 96px;
        display: grid;
        place-items: center;
        margin: 32px auto 8px;
        border-radius: 50%;
        background: #1864ab;
        color: white;
        font-size: 32px;
      }

      #target-area {
        min-height: 140px;
      }

      pre {
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        background: #f0f0ed;
        padding: 16px;
        border-radius: 6px;
        text-align: left;
      }

      .data-heading {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-top: 1em;
      }

      .data-heading p {
        margin: 0;
      }

      .prompt {
        font-family: monospace;
        font-size: 1rem;
        background: #f0f0ed;
        border-radius: 6px;
        padding: 12px 14px;
        line-height: 1.6;
        user-select: none;
      }

      .consent-note {
        font-size: 0.85em;
        color: #555;
        max-width: 42em;
      }
    </style>
  </head>
  <body>
    <main id="app"></main>

    <script>
      const copyTypingTargetText =
        "The quick red fox typed three edited words before fixing the last phrase.";

      // Set to your experiment ID from https://pipe.jspsych.org to enable automatic saving.
      const DATAPIPE_EXPERIMENT_ID = "N3X3wesDvTea";

      function downloadFinalJson() {
        const dataElement = document.querySelector("#data");
        if (!dataElement) return;

        const timestamp = new Date().toISOString().replace(/[:.]/g, "-");
        const blob = new Blob([dataElement.textContent], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");

        link.href = url;
        link.download = `record-session-run-${timestamp}.json`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      }

      function showEnd() {
        const recording = jsPsych.getSessionRecording();
        // Expose for Playwright drivers, matching the previous synthetic recorder.
        window._sessionRecording = recording;

        const app = document.querySelector("#app");
        app.innerHTML = `
          <h1>Done</h1>
          <div class="data-heading">
            <p>Collected data (record_session schema):</p>
            <button type="button" id="download" onclick="downloadFinalJson()">Download JSON</button>
          </div>
          <pre id="data"></pre>
        `;
        // The recording embeds DOM snapshots — set as text so markup can't render.
        document.querySelector("#data").textContent = JSON.stringify(recording, null, 2);

        if (DATAPIPE_EXPERIMENT_ID) {
          fetch("https://pipe.jspsych.org/api/data/", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              experimentID: DATAPIPE_EXPERIMENT_ID,
              filename: `run-${Date.now()}.json`,
              data: JSON.stringify(recording)
            })
          }).catch(err => console.warn("[datapipe] save failed:", err));
        }
      }

      const jsPsych = initJsPsych({
        display_element: "app",
        record_session: true,
        on_finish: showEnd
      });

      // Survey plugins render their submit control as <input type="submit">,
      // whose label is invisible to innerText-based screen readers (and was a
      // visible <button> in the pre-jsPsych version of this experiment). Swap
      // it for a real button; form submission behavior is unchanged.
      function submitInputToButton() {
        const input = document.querySelector('input[type="submit"].jspsych-btn');
        if (!input) return;
        const button = document.createElement("button");
        button.type = "submit";
        button.id = input.id;
        button.className = input.className;
        button.textContent = input.value;
        input.replaceWith(button);
      }

      const timeline = [];

      timeline.push({
        type: jsPsychHtmlButtonResponse,
        stimulus: `
          <h1>Welcome</h1>
          <p>This short experiment has a text question, a copy-typing task, a choice question, and a reaction-time task.</p>
          <p class="consent-note">This task records your mouse movements, clicks, and keystrokes (including the text you type) for research purposes. When you finish, your data is automatically saved to our research data repository; you can also download a personal copy. Continuing indicates your consent.</p>
        `,
        choices: ["Continue"],
        data: { trial_type_label: "welcome" }
      });

      timeline.push({
        type: jsPsychSurveyText,
        preamble: "<h1>Text response</h1>",
        questions: [{
          prompt: "What did you notice about this task?",
          name: "text_response",
          rows: 5,
          columns: 60
        }],
        button_label: "Continue",
        on_load: submitInputToButton,
        data: { trial_type_label: "text-response" }
      });

      timeline.push({
        type: jsPsychSurveyText,
        preamble: `
          <h1>Copy typing</h1>
          <p>Copy this sentence exactly:</p>
          <p class="prompt">${copyTypingTargetText}</p>
        `,
        questions: [{
          prompt: "Copy response",
          name: "copy_response",
          rows: 5,
          columns: 60
        }],
        button_label: "Continue",
        on_load: submitInputToButton,
        data: { trial_type_label: "copy-typing", target_text: copyTypingTargetText },
        on_finish: (data) => {
          data.exact_match = data.response?.copy_response === copyTypingTargetText;
        }
      });

      timeline.push({
        type: jsPsychSurveyMultiChoice,
        preamble: "<h1>Multiple choice</h1>",
        questions: [{
          prompt: "Which option best describes your current focus?",
          name: "focus",
          options: ["Low", "Medium", "High"],
          required: false
        }],
        button_label: "Continue",
        on_load: submitInputToButton,
        data: { trial_type_label: "multiple-choice" }
      });

      const rtTrialCount = 10;
      for (let rtIndex = 0; rtIndex < rtTrialCount; rtIndex++) {
        const instructions = `
          <h1>Reaction time</h1>
          <p id="rt-instructions">Trial ${rtIndex + 1} of ${rtTrialCount}: wait for the target, then press Space as quickly as you can.</p>
        `;

        timeline.push({
          type: jsPsychHtmlKeyboardResponse,
          stimulus: instructions + `<div id="target-area"></div>`,
          choices: "NO_KEYS",
          trial_duration: () => Math.round(700 + Math.random() * 1000),
          data: { trial_type_label: "reaction-time-wait", rt_trial_index: rtIndex }
        });

        timeline.push({
          type: jsPsychHtmlKeyboardResponse,
          stimulus: instructions + `<div id="target-area"><div class="target">!</div></div>`,
          choices: [" "],
          data: { trial_type_label: "reaction-time", rt_trial_index: rtIndex }
        });
      }

      jsPsych.run(timeline);
    </script>
  </body>
</html>
