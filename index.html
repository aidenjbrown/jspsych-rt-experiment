<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>jsPsych Bot Prototype</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f7f5;
        color: #202124;
      }

      main {
        width: min(720px, calc(100vw - 32px));
        margin: 80px auto;
      }

      .screen {
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 28px;
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      button {
        margin-top: 18px;
        padding: 10px 14px;
        border: 1px solid #222;
        border-radius: 6px;
        background: #222;
        color: white;
        cursor: pointer;
      }

      textarea {
        display: block;
        width: 100%;
        min-height: 120px;
        box-sizing: border-box;
        margin-top: 12px;
        padding: 10px;
      }

      label {
        display: block;
        margin: 12px 0;
      }

      .target {
        width: 96px;
        height: 96px;
        display: grid;
        place-items: center;
        margin: 32px auto 8px;
        border-radius: 50%;
        background: #1864ab;
        color: white;
        font-size: 32px;
      }

      pre {
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        background: #f0f0ed;
        padding: 16px;
        border-radius: 6px;
      }

      .data-heading {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-top: 1em;
      }

      .data-heading p {
        margin: 0;
      }

      .data-heading button {
        margin-top: 0;
      }
    </style>
  </head>
  <body>
    <main id="app"></main>

    <script>
      // ----------------------------------------------------------------------
      // Recorder — emits the jsPsych `record_session` schema-v1 shape so this
      // (non-jsPsych) prototype is compatible with the replay/detection pipeline.
      // Schema pinned from a real record_session export (jsPsych 8.2.3):
      //   top level: { schema_version, jspsych_version, recording_started_at(_perf),
      //                user_agent, viewport, rng, display_element_id, stylesheets,
      //                stylesheet_events, trials[], viewport_changes, rng_calls,
      //                ended_at_perf, end_reason }
      //   per trial: { trial_index, t_start, t_dom_ready, t_end, plugin,
      //                initial_dom, events[], trial_data }
      //   events (scope A — the detector-relevant subset):
      //     mouse.move   {type,t,x,y}
      //     mouse.down/up/click {type,t,x,y,button,target}
      //     key.down/up  {type,t,key,code,mods:{ctrl,shift,alt,meta},repeat,target}
      //     input.value  {type,t,node,value}
      //     input.checked{type,t,node,checked}
      //     scroll.window{type,t,x,y}
      //
      // Emulation caveats (vs. real jsPsych record_session):
      //   - `target`/`node` are stable integer IDs assigned on demand; they do NOT
      //     match jsPsych's DOM-snapshot numbering (we take no DOM snapshots here).
      //   - `jspsych_version` is null and `initial_dom`/mutations/seeded-rng are
      //     not reproduced. Fine for trace-based detection; not for the replay viewer.
      //   - focus/visibility events use best-guess dotted types (marked below) —
      //     confirm against a sample that triggers them before relying on the names.
      // ----------------------------------------------------------------------
      const app = document.querySelector("#app");
      const data = [];
      const copyTypingTargetText =
        "The quick red fox typed three edited words before fixing the last phrase.";

      const START_PERF = performance.now();
      const now = () => performance.now() - START_PERF; // ms since recording start

      const recording = {
        schema_version: 1,
        jspsych_version: null, // synthetic: this is not a jsPsych experiment
        recording_started_at: new Date().toISOString(),
        recording_started_at_perf: START_PERF,
        user_agent: navigator.userAgent,
        viewport: {
          w: window.innerWidth,
          h: window.innerHeight,
          dpr: window.devicePixelRatio,
          scale: 1,
          offset_x: 0,
          offset_y: 0
        },
        rng: { seed: null, math_random_patched: false },
        display_element_id: "app",
        stylesheets: [],
        stylesheet_events: [],
        trials: [],
        viewport_changes: [],
        rng_calls: [],
        ended_at_perf: null,
        end_reason: null
      };

      let currentTrial = null;
      let currentTrialStart = performance.now();

      // Stable integer ids for DOM nodes (does not match jsPsych's numbering).
      const nodeIds = new WeakMap();
      let nextNodeId = 1;
      function nodeId(target) {
        if (!(target instanceof Element)) return null;
        if (!nodeIds.has(target)) nodeIds.set(target, nextNodeId++);
        return nodeIds.get(target);
      }

      function emit(event) {
        if (!currentTrial) return; // events before the first trial are dropped
        // Rebuild so field order matches record_session exactly: type, t, then rest.
        const { type, ...rest } = event;
        currentTrial.events.push({ type, t: now(), ...rest });
      }

      function startTrial(plugin) {
        if (currentTrial) currentTrial.t_end = now();
        currentTrial = {
          trial_index: recording.trials.length,
          t_start: now(),
          t_dom_ready: null,
          t_end: null,
          plugin,
          initial_dom: null, // synthetic: no DOM snapshot in scope A
          events: [],
          trial_data: null
        };
        recording.trials.push(currentTrial);
      }

      function isCheckable(el) {
        return el instanceof HTMLInputElement &&
          (el.type === "checkbox" || el.type === "radio");
      }

      let pendingMouse = null;

      function installRecorder() {
        // Mouse position is sampled on requestAnimationFrame (~60Hz), matching
        // record_session, rather than on every (throttled) mousemove.
        document.addEventListener("mousemove", (e) => {
          pendingMouse = { x: Math.round(e.clientX), y: Math.round(e.clientY) };
        }, { passive: true });

        function frame() {
          if (pendingMouse) {
            emit({ type: "mouse.move", x: pendingMouse.x, y: pendingMouse.y });
            pendingMouse = null;
          }
          requestAnimationFrame(frame);
        }
        requestAnimationFrame(frame);

        document.addEventListener("mousedown", (e) => {
          emit({ type: "mouse.down", x: Math.round(e.clientX), y: Math.round(e.clientY), button: e.button, target: nodeId(e.target) });
        });
        document.addEventListener("mouseup", (e) => {
          emit({ type: "mouse.up", x: Math.round(e.clientX), y: Math.round(e.clientY), button: e.button, target: nodeId(e.target) });
        });
        document.addEventListener("click", (e) => {
          emit({ type: "mouse.click", x: Math.round(e.clientX), y: Math.round(e.clientY), button: e.button, target: nodeId(e.target) });
        });

        const mods = (e) => ({ ctrl: e.ctrlKey, shift: e.shiftKey, alt: e.altKey, meta: e.metaKey });
        document.addEventListener("keydown", (e) => {
          emit({ type: "key.down", key: e.key, code: e.code, mods: mods(e), repeat: e.repeat, target: nodeId(e.target) });
        });
        document.addEventListener("keyup", (e) => {
          emit({ type: "key.up", key: e.key, code: e.code, mods: mods(e), repeat: e.repeat, target: nodeId(e.target) });
        });

        document.addEventListener("input", (e) => {
          if (isCheckable(e.target)) {
            emit({ type: "input.checked", node: nodeId(e.target), checked: e.target.checked });
          } else {
            emit({ type: "input.value", node: nodeId(e.target), value: e.target.value ?? null });
          }
        });

        window.addEventListener("scroll", () => {
          emit({ type: "scroll.window", x: window.scrollX, y: window.scrollY });
        }, { passive: true });

        window.addEventListener("resize", () => {
          recording.viewport_changes.push({ t: now(), w: window.innerWidth, h: window.innerHeight });
        });

        // Tab-away / focus signals — dotted type names are BEST-GUESS (unconfirmed
        // against the schema sample, which had no focus/blur events). Kept because
        // tab-away is a detection signal; rename once confirmed against a real sample.
        window.addEventListener("blur", () => emit({ type: "window.blur" }));
        window.addEventListener("focus", () => emit({ type: "window.focus" }));
        document.addEventListener("visibilitychange", () => {
          emit({ type: "visibility.change", state: document.visibilityState });
        });
      }

      function downloadFinalJson() {
        const dataElement = document.querySelector("#data");
        if (!dataElement) return;

        const timestamp = new Date().toISOString().replace(/[:.]/g, "-");
        const blob = new Blob([dataElement.textContent], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");

        link.href = url;
        link.download = `record-session-run-${timestamp}.json`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      }

      function setTrial(name) {
        currentTrialStart = performance.now();
        startTrial(name);
        return name;
      }

      function record(trialType, values = {}) {
        const entry = {
          trial_type: trialType,
          duration_ms: Math.round(performance.now() - currentTrialStart),
          ...values
        };
        data.push(entry);
        if (currentTrial) currentTrial.trial_data = entry;
      }

      function render(html) {
        app.innerHTML = `<section class="screen">${html}</section>`;
        if (currentTrial && currentTrial.t_dom_ready === null) {
          currentTrial.t_dom_ready = now();
        }
      }

      function showWelcome() {
        setTrial("welcome");
        render(`
          <h1>Welcome</h1>
          <p>This short experiment has a text question, a copy-typing task, a choice question, and a reaction-time task.</p>
          <p style="font-size:0.85em;color:#555;max-width:42em;">This task records your mouse movements, clicks, and keystrokes (including the text you type) for research purposes. Continuing and submitting your data file indicates your consent.</p>
          <button id="continue">Continue</button>
        `);
        document.querySelector("#continue").addEventListener("click", () => {
          record("welcome");
          showTextResponse();
        });
      }

      function showTextResponse() {
        setTrial("text-response");
        render(`
          <h1>Text response</h1>
          <label for="text-response">What did you notice about this task?</label>
          <textarea id="text-response" autocomplete="off"></textarea>
          <button id="continue">Continue</button>
        `);
        document.querySelector("#continue").addEventListener("click", () => {
          record("text-response", {
            response: document.querySelector("#text-response").value
          });
          showCopyTyping();
        });
      }

      function showCopyTyping() {
        setTrial("copy-typing");
        render(`
          <h1>Copy typing</h1>
          <p>Copy this sentence exactly:</p>
          <p class="prompt">${copyTypingTargetText}</p>
          <label for="copy-response">Copy response</label>
          <textarea id="copy-response" autocomplete="off"></textarea>
          <button id="continue">Continue</button>
        `);
        document.querySelector("#continue").addEventListener("click", () => {
          const response = document.querySelector("#copy-response").value;
          record("copy-typing", {
            target_text: copyTypingTargetText,
            response,
            exact_match: response === copyTypingTargetText
          });
          showMultipleChoice();
        });
      }

      function showMultipleChoice() {
        setTrial("multiple-choice");
        render(`
          <h1>Multiple choice</h1>
          <p>Which option best describes your current focus?</p>
          <label><input type="radio" name="focus" value="low"> Low</label>
          <label><input type="radio" name="focus" value="medium"> Medium</label>
          <label><input type="radio" name="focus" value="high"> High</label>
          <button id="continue">Continue</button>
        `);
        document.querySelector("#continue").addEventListener("click", () => {
          const selected = document.querySelector("input[name='focus']:checked");
          record("multiple-choice", {
            response: selected ? selected.value : null
          });
          showReactionTime();
        });
      }

      function showReactionTime(trialIndex = 0) {
        setTrial("reaction-time");
        const trialCount = 10;
        const delayMs = Math.round(700 + Math.random() * 1000);
        let targetShownAt = null;
        let responded = false;

        render(`
          <h1>Reaction time</h1>
          <p id="rt-instructions">Trial ${trialIndex + 1} of ${trialCount}: wait for the target, then press Space as quickly as you can.</p>
          <div id="target-area"></div>
        `);

        const timeoutId = window.setTimeout(() => {
          targetShownAt = performance.now();
          document.querySelector("#target-area").innerHTML = `<div class="target">!</div>`;
        }, delayMs);

        function handleKeydown(event) {
          if (event.code !== "Space" || responded) return;
          responded = true;
          window.clearTimeout(timeoutId);
          document.removeEventListener("keydown", handleKeydown);
          record("reaction-time", {
            trial_index: trialIndex,
            delay_ms: delayMs,
            rt_ms: targetShownAt ? Math.round(performance.now() - targetShownAt) : null,
            early_response: targetShownAt === null
          });
          if (trialIndex + 1 < trialCount) {
            showReactionTime(trialIndex + 1);
          } else {
            showEnd();
          }
        }

        document.addEventListener("keydown", handleKeydown);
      }

      function showEnd() {
        if (currentTrial) currentTrial.t_end = now();
        recording.ended_at_perf = performance.now();
        recording.end_reason = "experiment_finished";
        // Expose like the real recorder so a Playwright driver can grab it.
        window._sessionRecording = recording;

        render(`
          <h1>Done</h1>
          <div class="data-heading">
            <p>Collected data (record_session schema):</p>
            <button type="button" onclick="downloadFinalJson()">Download JSON</button>
          </div>
          <pre id="data">${JSON.stringify(recording, null, 2)}</pre>
        `);
      }

      installRecorder();
      showWelcome();
    </script>
  </body>
</html>
